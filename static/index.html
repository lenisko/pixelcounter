<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Counter</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --border: #0f3460;
    --accent: #e94560;
    --text: #eee;
    --text-dim: #999;
    --radius: 6px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  .btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--border); }
  .btn-accent { background: var(--accent); border-color: var(--accent); }
  .btn-accent:hover { background: #c7384f; }

  .layout {
    display: flex;
    height: calc(100vh - 52px);
  }
  .sidebar {
    width: 320px;
    min-width: 320px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .canvas-wrap {
    flex: 1;
    overflow: auto;
    position: relative;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
  }
  .canvas-container {
    position: relative;
    display: inline-block;
    cursor: crosshair;
  }
  .canvas-container canvas { display: block; }
  #overlayCanvas {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
  }

  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .scale-group {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .scale-group input {
    width: 70px;
    padding: 4px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
  }
  .scale-group select {
    padding: 4px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
  }

  .color-entry {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px;
    position: relative;
  }
  .color-entry-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .color-swatch {
    width: 28px; height: 28px;
    border-radius: 4px;
    border: 2px solid #555;
    flex-shrink: 0;
  }
  .color-hex {
    font-family: monospace;
    font-size: 13px;
    flex: 1;
  }
  .color-remove {
    background: none; border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px; line-height: 1;
    padding: 2px 6px;
  }
  .color-remove:hover { color: var(--accent); }

  .threshold-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .threshold-row label {
    font-size: 12px;
    color: var(--text-dim);
    width: 65px;
  }
  .threshold-row input[type=range] { flex: 1; accent-color: var(--accent); }
  .threshold-row .val {
    font-size: 12px; font-family: monospace;
    width: 28px; text-align: right;
  }

  .color-adjust-row {
    display: flex;
    gap: 6px;
    margin-bottom: 4px;
    align-items: center;
  }
  .color-adjust-row label {
    font-size: 11px; color: var(--text-dim);
    width: 14px; text-align: center;
  }
  .color-adjust-row input[type=number] {
    width: 56px; padding: 2px 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-size: 12px; font-family: monospace;
  }

  .color-stats {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
    font-family: monospace;
  }
  .color-stats strong { color: var(--text); }

  .mask-color-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .mask-color-row label { font-size: 12px; color: var(--text-dim); }
  .mask-color-row input[type=color] {
    width: 28px; height: 22px; padding: 0;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: none; cursor: pointer;
  }

  .totals {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px;
    font-size: 13px;
    font-family: monospace;
    line-height: 1.7;
  }
  .totals strong { color: var(--accent); }

  .zoom-controls {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-left: auto;
  }
  .zoom-controls span { font-size: 12px; color: var(--text-dim); }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%; width: 100%;
    color: var(--text-dim);
    font-size: 15px;
    flex-direction: column;
    gap: 12px;
  }

  .opacity-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .opacity-row label { font-size: 12px; color: var(--text-dim); width: 65px; }
  .opacity-row input[type=range] { flex: 1; accent-color: var(--accent); }
  .opacity-row .val {
    font-size: 12px; font-family: monospace;
    width: 34px; text-align: right;
  }

  #fileInput { display: none; }

  #langSelect {
    padding: 4px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
  }

  .drop-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(233, 69, 96, 0.15);
    border: 3px dashed var(--accent);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: var(--accent);
    pointer-events: none;
  }
  .drop-overlay.active { display: flex; }
</style>
</head>
<body>

<div class="drop-overlay" id="dropOverlay"></div>

<header>
  <h1>Pixel Counter</h1>
  <button class="btn btn-accent" id="btnLoad">Load Image</button>
  <input type="file" id="fileInput" accept="image/*">
  <div class="zoom-controls">
    <button class="btn" onclick="setZoom(zoom - 0.25)">-</button>
    <span id="zoomLabel">100%</span>
    <button class="btn" onclick="setZoom(zoom + 0.25)">+</button>
    <button class="btn" onclick="setZoom('fit')">Fit</button>
    <select id="langSelect">
      <option value="en">EN</option>
      <option value="pl">PL</option>
    </select>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <div class="section-title" id="scaleModeLabel" style="margin-bottom:0"></div>
        <button class="btn" id="scaleModeToggle" style="font-size:10px;padding:1px 8px;line-height:1.4" onclick="toggleScaleMode()">&#x21C4;</button>
      </div>
      <div class="scale-group">
        <span id="scalePrefix" style="font-size:12px;color:var(--text-dim)">1 px =</span>
        <input type="text" inputmode="decimal" id="pxW" value="1">
        <span style="font-size:12px;color:var(--text-dim)">&times;</span>
        <input type="text" inputmode="decimal" id="pxH" value="1">
        <select id="pxUnit">
          <option value="mm">mm</option>
          <option value="cm">cm</option>
          <option value="m">m</option>
          <option value="km">km</option>
        </select>
      </div>
      <div class="image-info" id="imageInfo" style="font-size:12px;font-family:monospace;color:var(--text-dim);margin-top:8px;line-height:1.7;display:none"></div>
    </div>

    <div>
      <div class="section-title" data-t="overlay"></div>
      <div class="opacity-row">
        <label data-t="opacity"></label>
        <input type="range" id="overlayOpacity" min="0" max="100" value="50">
        <span class="val" id="opacityVal">50%</span>
      </div>
    </div>

    <div>
      <div class="section-title" data-t="colorSelections"></div>
      <p id="pickHint" style="font-size:12px;color:var(--text-dim);margin-bottom:8px"></p>
      <div id="colorList"></div>
    </div>

    <div id="totalsSection" style="display:none">
      <div class="section-title" data-t="results"></div>
      <div class="totals" id="totals"></div>
    </div>
  </aside>

  <div class="canvas-wrap" id="canvasWrap">
    <div class="empty-state" id="emptyState">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="m21 15-5-5L5 21"/>
      </svg>
      <span id="emptyText"></span>
    </div>
    <div class="canvas-container" id="canvasContainer" style="display:none">
      <canvas id="mainCanvas"></canvas>
      <canvas id="overlayCanvas"></canvas>
    </div>
  </div>
</div>

<script>
// ── i18n ──
const LANG = {
  en: {
    pixelScale: 'Pixel Scale',
    overallScale: 'Overall Scale',
    overlay: 'Overlay',
    opacity: 'Opacity',
    colorSelections: 'Color Selections',
    pickHint: 'Click image to pick color',
    results: 'Results',
    loadImage: 'Load Image',
    emptyText: 'Load an image or drop it here',
    dropHint: 'Drop image here',
    threshold: 'Threshold',
    mask: 'Mask',
    area: 'Area',
    total: 'Total',
    selected: 'Selected',
    unselected: 'Unselected',
  },
  pl: {
    pixelScale: 'Skala piksela',
    overallScale: 'Skala obrazu',
    overlay: 'Nak\u0142adka',
    opacity: 'Krycie',
    colorSelections: 'Wyb\u00F3r kolor\u00F3w',
    pickHint: 'Kliknij obraz, aby pobra\u0107 kolor',
    results: 'Wyniki',
    loadImage: 'Wczytaj obraz',
    emptyText: 'Wczytaj obraz lub upu\u015B\u0107 go tutaj',
    dropHint: 'Upu\u015B\u0107 obraz tutaj',
    threshold: 'Pr\u00F3g',
    mask: 'Maska',
    area: 'Powierzchnia',
    total: 'Razem',
    selected: 'Zaznaczone',
    unselected: 'Niezaznaczone',
  },
};

let lang = 'en';

function detectLang() {
  const saved = localStorage.getItem('lang');
  if (saved && LANG[saved]) return saved;
  const nav = (navigator.language || '').toLowerCase();
  if (nav.startsWith('pl')) return 'pl';
  return 'en';
}

function t(key) { return LANG[lang][key] || LANG.en[key] || key; }

function applyLang() {
  document.querySelectorAll('[data-t]').forEach(el => {
    el.textContent = t(el.dataset.t);
  });
  document.getElementById('btnLoad').textContent = t('loadImage');
  document.getElementById('pickHint').textContent = t('pickHint');
  document.getElementById('emptyText').textContent = t('emptyText');
  document.getElementById('dropOverlay').textContent = t('dropHint');
  document.getElementById('langSelect').value = lang;
  updateScaleUI();
  renderSelections();
  if (imgData) recount();
}

function setLang(l) {
  lang = l;
  localStorage.setItem('lang', l);
  applyLang();
}

document.getElementById('langSelect').addEventListener('change', (e) => setLang(e.target.value));

function parseNum(v) { return Number(String(v).replace(',', '.')) || 0; }

// ── Scale mode ──
function updateScaleUI() {
  const label = document.getElementById('scaleModeLabel');
  const prefix = document.getElementById('scalePrefix');
  if (scaleMode === 'overall') {
    label.textContent = t('overallScale');
    prefix.style.display = 'none';
  } else {
    label.textContent = t('pixelScale');
    prefix.style.display = '';
  }
}

function toggleScaleMode() {
  const wEl = document.getElementById('pxW');
  const hEl = document.getElementById('pxH');
  if (scaleMode === 'overall') {
    if (img) {
      const w = parseNum(wEl.value) || 1;
      const h = parseNum(hEl.value) || 1;
      wEl.value = (w / img.width).toFixed(4);
      hEl.value = (h / img.height).toFixed(4);
    }
    scaleMode = 'pixel';
  } else {
    if (img) {
      const w = parseNum(wEl.value) || 1;
      const h = parseNum(hEl.value) || 1;
      wEl.value = (w * img.width).toFixed(2);
      hEl.value = (h * img.height).toFixed(2);
    }
    scaleMode = 'overall';
  }
  localStorage.setItem('scaleMode', scaleMode);
  localStorage.setItem('pxW', wEl.value);
  localStorage.setItem('pxH', hEl.value);
  updateScaleUI();
  if (imgData) recount();
}

// ── Constants ──
const MASK_COLORS = [
  '#e94560', '#00d2ff', '#00ff88', '#ffaa00', '#ff44ff',
  '#44ffff', '#aaff00', '#ff6644', '#8844ff', '#ff0088'
];

let img = null;
let imgData = null;
let zoom = 1;
let selections = [];
let nextId = 0;
let scaleMode = 'overall';

const mainCanvas = document.getElementById('mainCanvas');
const overlayCanvas = document.getElementById('overlayCanvas');
const mainCtx = mainCanvas.getContext('2d', { willReadFrequently: true });
const overlayCtx = overlayCanvas.getContext('2d');

// ── Image loading ──
function loadImageFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const i = new Image();
    i.onload = () => {
      img = i;
      mainCanvas.width = img.width;
      mainCanvas.height = img.height;
      overlayCanvas.width = img.width;
      overlayCanvas.height = img.height;
      mainCtx.drawImage(img, 0, 0);
      imgData = mainCtx.getImageData(0, 0, img.width, img.height);
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('canvasContainer').style.display = 'inline-block';
      selections = [];
      nextId = 0;
      renderSelections();
      setZoom('fit');
    };
    i.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

document.getElementById('btnLoad').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', (e) => {
  if (e.target.files[0]) loadImageFile(e.target.files[0]);
});

// ── Drag & drop ──
let dragCounter = 0;
const dropOverlay = document.getElementById('dropOverlay');

document.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragCounter++;
  dropOverlay.classList.add('active');
});
document.addEventListener('dragleave', (e) => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) {
    dragCounter = 0;
    dropOverlay.classList.remove('active');
  }
});
document.addEventListener('dragover', (e) => e.preventDefault());
document.addEventListener('drop', (e) => {
  e.preventDefault();
  dragCounter = 0;
  dropOverlay.classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file) loadImageFile(file);
});

// ── Zoom ──
function setZoom(val) {
  if (!img) return;
  if (val === 'fit') {
    const wrap = document.getElementById('canvasWrap');
    const scaleX = (wrap.clientWidth - 20) / img.width;
    const scaleY = (wrap.clientHeight - 20) / img.height;
    zoom = Math.min(scaleX, scaleY, 4);
    zoom = Math.max(0.1, Math.round(zoom * 100) / 100);
  } else {
    zoom = Math.max(0.1, Math.min(val, 8));
  }
  mainCanvas.style.width = (img.width * zoom) + 'px';
  mainCanvas.style.height = (img.height * zoom) + 'px';
  overlayCanvas.style.width = (img.width * zoom) + 'px';
  overlayCanvas.style.height = (img.height * zoom) + 'px';
  document.getElementById('zoomLabel').textContent = Math.round(zoom * 100) + '%';
}

// ── Color picking ──
document.getElementById('canvasContainer').addEventListener('click', (e) => {
  if (!imgData) return;
  const rect = mainCanvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / zoom);
  const y = Math.floor((e.clientY - rect.top) / zoom);
  if (x < 0 || y < 0 || x >= img.width || y >= img.height) return;
  const idx = (y * img.width + x) * 4;
  addSelection(imgData.data[idx], imgData.data[idx + 1], imgData.data[idx + 2]);
});

function addSelection(r, g, b) {
  const id = nextId++;
  selections.push({ id, r, g, b, threshold: 30, maskColor: MASK_COLORS[id % MASK_COLORS.length], count: 0 });
  renderSelections();
  recount();
}

function removeSelection(id) {
  selections = selections.filter(s => s.id !== id);
  renderSelections();
  recount();
}

function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(c => c.toString(16).padStart(2, '0')).join('');
}
function hexToRgb(hex) {
  const m = hex.match(/^#?([\da-f]{2})([\da-f]{2})([\da-f]{2})$/i);
  return m ? { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) } : null;
}

// ── Render sidebar ──
function renderSelections() {
  const list = document.getElementById('colorList');
  list.innerHTML = '';
  selections.forEach(sel => {
    const hex = rgbToHex(sel.r, sel.g, sel.b);
    const div = document.createElement('div');
    div.className = 'color-entry';
    div.innerHTML = `
      <div class="color-entry-header">
        <div class="color-swatch" style="background:${hex}"></div>
        <span class="color-hex">${hex} (${sel.r},${sel.g},${sel.b})</span>
        <button class="color-remove" data-id="${sel.id}">&times;</button>
      </div>
      <div class="threshold-row">
        <label>${t('threshold')}</label>
        <input type="range" min="0" max="255" value="${sel.threshold}" data-id="${sel.id}" class="threshold-slider">
        <span class="val">${sel.threshold}</span>
      </div>
      <div class="color-adjust-row">
        <label>R</label>
        <input type="number" min="0" max="255" value="${sel.r}" data-id="${sel.id}" data-ch="r">
        <label>G</label>
        <input type="number" min="0" max="255" value="${sel.g}" data-id="${sel.id}" data-ch="g">
        <label>B</label>
        <input type="number" min="0" max="255" value="${sel.b}" data-id="${sel.id}" data-ch="b">
      </div>
      <div class="mask-color-row">
        <label>${t('mask')}</label>
        <input type="color" value="${sel.maskColor}" data-id="${sel.id}" class="mask-picker">
      </div>
      <div class="color-stats" data-stats="${sel.id}"></div>
    `;
    list.appendChild(div);
  });

  list.querySelectorAll('.color-remove').forEach(btn => {
    btn.addEventListener('click', () => removeSelection(Number(btn.dataset.id)));
  });
  list.querySelectorAll('.threshold-slider').forEach(slider => {
    slider.addEventListener('input', (e) => {
      const sel = selections.find(s => s.id === Number(e.target.dataset.id));
      if (sel) {
        sel.threshold = Number(e.target.value);
        e.target.nextElementSibling.textContent = sel.threshold;
        scheduleRecount();
      }
    });
  });
  list.querySelectorAll('.color-adjust-row input[type=number]').forEach(inp => {
    inp.addEventListener('change', (e) => {
      const sel = selections.find(s => s.id === Number(e.target.dataset.id));
      if (sel) {
        sel[e.target.dataset.ch] = Math.max(0, Math.min(255, Number(e.target.value)));
        renderSelections();
        recount();
      }
    });
  });
  list.querySelectorAll('.mask-picker').forEach(inp => {
    inp.addEventListener('input', (e) => {
      const sel = selections.find(s => s.id === Number(e.target.dataset.id));
      if (sel) {
        sel.maskColor = e.target.value;
        scheduleRecount();
      }
    });
  });
}

// ── Counting + overlay ──
let recountTimer = null;
function scheduleRecount() {
  clearTimeout(recountTimer);
  recountTimer = setTimeout(recount, 60);
}

function recount() {
  if (!imgData) return;
  const data = imgData.data;
  const totalPixels = img.width * img.height;
  const overlayOpacity = Number(document.getElementById('overlayOpacity').value) / 100;

  overlayCtx.clearRect(0, 0, img.width, img.height);
  const ovImg = overlayCtx.createImageData(img.width, img.height);
  const ov = ovImg.data;

  const inputW = parseNum(document.getElementById('pxW').value) || 1;
  const inputH = parseNum(document.getElementById('pxH').value) || 1;
  const unit = document.getElementById('pxUnit').value;
  let pxW, pxH;
  if (scaleMode === 'overall') {
    pxW = inputW / img.width;
    pxH = inputH / img.height;
  } else {
    pxW = inputW;
    pxH = inputH;
  }
  const pxArea = pxW * pxH;

  // Unit conversion: pxArea is in unit², convert to mm² as base
  const toMm = { mm: 1, cm: 10, m: 1000, km: 1e6 };
  const pxMm2 = pxArea * toMm[unit] * toMm[unit];
  function allUnits(px) {
    const mm2 = px * pxMm2;
    const parts = [];
    if (mm2 < 100) parts.push(mm2.toFixed(2) + ' mm\u00B2');
    else parts.push((mm2 / 100).toFixed(4) + ' cm\u00B2');
    if (mm2 >= 100) parts.push((mm2 / 1e6).toFixed(6) + ' m\u00B2');
    if (mm2 >= 1e8) parts.push((mm2 / 1e8).toFixed(4) + ' ar');
    if (mm2 >= 1e10) parts.push((mm2 / 1e10).toFixed(4) + ' ha');
    if (mm2 >= 1e6) parts.push((mm2 / 1e12).toFixed(9) + ' km\u00B2');
    return parts.join('<br>');
  }

  // Image dimensions
  const infoEl = document.getElementById('imageInfo');
  infoEl.style.display = '';
  if (scaleMode === 'overall') {
    infoEl.innerHTML =
      `${img.width} &times; ${img.height} px<br>` +
      `1 px = ${pxW.toFixed(4)} &times; ${pxH.toFixed(4)} ${unit}`;
  } else {
    const imgW = (img.width * pxW).toFixed(2);
    const imgH = (img.height * pxH).toFixed(2);
    infoEl.innerHTML =
      `${img.width} &times; ${img.height} px<br>` +
      `${imgW} &times; ${imgH} ${unit}`;
  }

  // Single pass
  selections.forEach(s => s.count = 0);

  for (let i = 0; i < data.length; i += 4) {
    const pr = data[i], pg = data[i + 1], pb = data[i + 2];
    for (let j = 0; j < selections.length; j++) {
      const sel = selections[j];
      const dist = Math.sqrt((pr - sel.r) ** 2 + (pg - sel.g) ** 2 + (pb - sel.b) ** 2);
      if (dist <= sel.threshold) {
        sel.count++;
        const mc = hexToRgb(sel.maskColor);
        ov[i] = mc.r; ov[i+1] = mc.g; ov[i+2] = mc.b;
        ov[i+3] = Math.round(255 * overlayOpacity);
        break;
      }
    }
  }

  overlayCtx.putImageData(ovImg, 0, 0);

  // Per-selection stats
  let selectedTotal = 0;
  selections.forEach(sel => {
    selectedTotal += sel.count;
    const statEl = document.querySelector(`[data-stats="${sel.id}"]`);
    if (statEl) {
      const pct = totalPixels > 0 ? (sel.count / totalPixels * 100).toFixed(2) : 0;
      statEl.innerHTML = `<strong>${sel.count.toLocaleString()}</strong> px (${pct}%)<br>${allUnits(sel.count)}`;
    }
  });

  // Totals
  const totalsEl = document.getElementById('totals');
  const totalsSection = document.getElementById('totalsSection');
  if (selections.length > 0) {
    totalsSection.style.display = '';
    const selPct = totalPixels > 0 ? (selectedTotal / totalPixels * 100).toFixed(2) : 0;
    const unsel = totalPixels - selectedTotal;
    const unselPct = totalPixels > 0 ? (unsel / totalPixels * 100).toFixed(2) : 0;
    totalsEl.innerHTML =
      `<strong>${t('total')}:</strong><br>${totalPixels.toLocaleString()} px<br>${allUnits(totalPixels)}<br><br>` +
      `<strong>${t('selected')}:</strong><br>${selectedTotal.toLocaleString()} px (${selPct}%)<br>${allUnits(selectedTotal)}<br><br>` +
      `<strong>${t('unselected')}:</strong><br>${unsel.toLocaleString()} px (${unselPct}%)<br>${allUnits(unsel)}`;
  } else {
    totalsSection.style.display = 'none';
  }
}

// Recount on scale/opacity change
document.getElementById('pxW').addEventListener('input', () => {
  localStorage.setItem('pxW', document.getElementById('pxW').value);
  scheduleRecount();
});
document.getElementById('pxH').addEventListener('input', () => {
  localStorage.setItem('pxH', document.getElementById('pxH').value);
  scheduleRecount();
});
document.getElementById('pxUnit').addEventListener('change', () => {
  localStorage.setItem('pxUnit', document.getElementById('pxUnit').value);
  recount();
});
document.getElementById('overlayOpacity').addEventListener('input', (e) => {
  document.getElementById('opacityVal').textContent = e.target.value + '%';
  localStorage.setItem('overlayOpacity', e.target.value);
  scheduleRecount();
});

// ── Init ──
function restoreSettings() {
  const sm = localStorage.getItem('scaleMode');
  if (sm) scaleMode = sm;
  const pw = localStorage.getItem('pxW');
  if (pw) document.getElementById('pxW').value = pw;
  const ph = localStorage.getItem('pxH');
  if (ph) document.getElementById('pxH').value = ph;
  const u = localStorage.getItem('pxUnit');
  if (u) document.getElementById('pxUnit').value = u;
  const o = localStorage.getItem('overlayOpacity');
  if (o) {
    document.getElementById('overlayOpacity').value = o;
    document.getElementById('opacityVal').textContent = o + '%';
  }
}

lang = detectLang();
restoreSettings();
applyLang();
</script>
